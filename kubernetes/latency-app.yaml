apiVersion: apps/v1
kind: Deployment
metadata:
  name: latency-app
  namespace: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: latency-app
  template:
    metadata:
      labels:
        app: latency-app
    spec:
      containers:
      - name: app
        image: ghcr.io/stefanprodan/podinfo:6.3.6
        env:
        - name: PODINFO_DELAY
          value: "500ms"
        ports:
        - containerPort: 9898